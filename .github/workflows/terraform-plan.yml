name: Terraform Plan
on:
  pull_request:
    branches: [main]

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, gcp, azure]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev
      - name: Terraform Plan
        run: terraform plan -var-file="${{ matrix.cloud }}.tfvars" -out=plan.tfplan
        working-directory: environments/dev
